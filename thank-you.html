<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --color-bg: #F8F6F1;
      --color-bg-alt: #EFEBE3;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-text-subtle: #9B9B9B;
      --color-accent: #2B4C3F;
      --color-line: #E8E3D8;
      --color-line-dark: #1A1A1A;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --tracking-tight: -0.03em;
      --tracking-wide: 0.12em;
      --container-padding: clamp(1.5rem, 5vw, 6rem);
      --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* Nav */
    .nav {
      padding: 1.25rem var(--container-padding);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--color-line);
    }
    .nav__logo {
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--color-text);
    }

    /* Main */
    .thankyou {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 60px);
    }
    .thankyou__photo {
      overflow: hidden;
      position: relative;
    }
    .thankyou__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .thankyou__content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(3rem, 8vw, 7rem) var(--container-padding);
    }
    .thankyou__eyebrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }
    .thankyou__title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: var(--tracking-tight);
      margin: 0 0 1.5rem;
    }
    .thankyou__desc {
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(1rem, 1.3vw, 1.1875rem);
      line-height: 1.65;
      color: var(--color-text-muted);
      margin: 0 0 3rem;
      max-width: 38ch;
    }
    .thankyou__divider {
      width: 3rem;
      height: 1px;
      background: var(--color-line-dark);
      margin-bottom: 2rem;
    }
    .thankyou__meta {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }
    .thankyou__back {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-text-muted);
      transition: color 0.3s;
    }
    .thankyou__back:hover { color: var(--color-text); }
    .thankyou__back::before {
      content: '←';
      display: inline-block;
      transition: transform 0.3s;
    }
    .thankyou__back:hover::before { transform: translateX(-4px); }
    .thankyou__tg {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 1.5rem;
      transition: opacity 0.3s;
    }
    .thankyou__tg:hover { opacity: 0.7; }

    @media (max-width: 768px) {
      .thankyou { grid-template-columns: 1fr; }
      .thankyou__photo { height: 50vw; min-height: 280px; }
      .thankyou__content { padding: 3rem var(--container-padding); }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__logo">RECREATE</a>
</nav>

<div class="thankyou">
  <div class="thankyou__photo">
    <img src="thankyou-photo.jpg" alt="Recreate Mountain Camp" />
  </div>
  <div class="thankyou__content">
    <div class="thankyou__eyebrow">Recreate Mountain Camp · Chamonix 2026</div>
    <h1 class="thankyou__title">Дякуємо<br />за заявку.</h1>
    <p class="thankyou__desc">
      Зовсім скоро ми зв'яжемося з тобою — і разом визначимо, чи це саме твоє.
    </p>
    <div class="thankyou__divider"></div>
    <a href="https://t.me/myrecreate?text=Привіт! Я залишив заявку на Recreate Mountain Camp і маю питання 🏔" target="_blank" class="thankyou__tg">
      Залишились питання? Пишіть нам →
    </a>
    <p class="thankyou__meta">June 6–13, 2026 · Chamonix, France</p>
    <a href="index.html" class="thankyou__back">Повернутись на сайт</a>
  </div>
</div>

</body>
</html>
